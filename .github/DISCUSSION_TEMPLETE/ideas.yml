title: "[Idea] "
labels: ["idea", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        새로운 아이디어나 개선 제안을 자유롭게 남겨주세요.
        문제점과 기대 효과를 함께 적어주시면 논의에 도움이 됩니다.

  - type: input
    id: summary
    attributes:
      label: 제안 한 줄 요약
      description: 아이디어를 한 줄로 적어주세요.
      placeholder: 예) 채팅 목록 검색 기능을 추가하면 좋겠습니다.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 해결하고 싶은 문제
      description: 어떤 불편함이나 한계가 있는지 설명해주세요.
      placeholder: |
        예)
        - 이전 대화를 찾기 어렵습니다.
        - 대화가 많아질수록 탐색 시간이 길어집니다.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 어떤 방식으로 개선하면 좋을지 적어주세요.
      placeholder: 예) 제목, 날짜, 키워드 기준으로 검색할 수 있게 하면 좋겠습니다.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
      description: 다른 방법이나 비교한 아이디어가 있다면 적어주세요.
      placeholder: 예) 필터 기능만 두는 방법도 생각했지만 검색이 더 직관적이라고 봤습니다.
    validations:
      required: false

  - type: textarea
    id: benefit
    attributes:
      label: 기대 효과
      description: 이 아이디어가 어떤 도움이 되는지 적어주세요.
      placeholder: 예) 오래된 대화를 더 빨리 찾을 수 있고 사용성이 좋아집니다.
    validations:
      required: false

  - type: input
    id: related_area
    attributes:
      label: 관련 영역
      description: 관련 기능이나 파트를 적어주세요.
      placeholder: 예) frontend, backend, auth, api, ux
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: 확인 사항
      options:
        - label: 비슷한 제안이 이미 있는지 먼저 확인했습니다.
          required: true
